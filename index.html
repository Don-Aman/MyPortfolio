<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Portfolio – Amanuel Tesfalem</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Font Awesome & Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        /* RESET & VARIABLES */
        :root {
            --bg: #0f0f12;
            --paper: #f5f2ed;
            --edge: #e6e2dc;
            --shadow: rgba(0, 0, 0, 0.25);
            --accent: #ffffff;
            --text-dark: #1e1e1e;
            --text-light: #eaeaea;
            --gold-accent: #b48c5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ================= NAV (unchanged) ================= */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 40px;
            z-index: 1000;
            background: rgba(15, 15, 18, 0);
            backdrop-filter: blur(0px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0);
        }

        nav.scrolled {
            background: rgba(15, 15, 18, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(180, 140, 90, 0.2);
            padding: 18px 40px;
        }

        nav.scrolled a {
            color: black;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 15px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            opacity: 0.8;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -6px;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav a:hover {
            opacity: 1;
            color: var(--accent);
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a.active {
            opacity: 1;
            color: var(--accent);
        }

        nav a.active::after {
            width: 100%;
        }

        .contact-dropdown {
            position: relative;
        }

        .contact-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(15, 15, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(180, 140, 90, 0.3);
            border-radius: 4px;
            padding: 20px;
            min-width: 250px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .dropdown-content.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .contact-info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-light);
            font-size: 14px;
        }

        .contact-info-item:last-child {
            margin-bottom: 0;
        }

        .contact-info-item i {
            width: 20px;
            margin-right: 12px;
            color: var(--gold-accent);
            font-style: normal;
            font-weight: 500;
        }

        .contact-info-item span,
        .contact-info-item a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: normal;
            text-transform: none;
        }

        .contact-info-item a:hover {
            color: var(--gold-accent);
        }

        nav.scrolled .contact-info-item,
        nav.scrolled .contact-info-item a {
            color: var(--text-dark);
        }

        nav.scrolled .contact-info-item a:hover {
            color: var(--gold-accent);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
            margin-top: 80px;
            width: 100%;
        }

        .page-wrapper {
            width: 100%;
            margin: 0;
            padding: 0;
            display: none;
        }

        .page-wrapper.active {
            display: block;
        }

        /* ================= ARTBOARD (FIXED FOR TALL IMAGES) ================= */
        .artboard {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border-bottom: 2px solid #3a3a3a;
            /* subtle separator */
            background: #0a0a0c;
            /* background while image loads */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .artboard:last-child {
            border-bottom: none;
        }

        /* The key fix: make image responsive and respect its natural height */
        .artboard img {
            display: block;
            width: 100%;
            height: auto;
            /* let height be determined by aspect ratio */
            max-width: 100%;
            /* never exceed container width */
            object-fit: contain;
            /* ensure full visibility, no cropping */
            object-position: center;
            background: #0f0f12;
            /* background for letterboxing if needed */
        }

        /* ========== optional caption (unchanged style) ========== */
        .image-caption {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            color: var(--text-light);
            max-width: 400px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .caption-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .caption-description {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.5;
        }

        /* ================= FOOTER ================= */
        footer {
            position: relative;
            /* changed from fixed to avoid overlap */
            margin-top: 40px;
            padding: 20px;
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
            width: 100%;
        }

        /* ================= RESPONSIVE (refined for mobile) ================= */
        @media (max-width: 900px) {
            .mobile-menu-btn {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: rgba(15, 15, 18, 0.95);
                backdrop-filter: blur(10px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 30px;
                transition: right 0.4s ease;
                z-index: 1000;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 16px;
            }

            /* artboard already handles mobile naturally with height:auto */
            .image-caption {
                bottom: 20px;
                left: 20px;
                right: 20px;
                max-width: none;
            }

            .dropdown-content {
        right: 0;
        left: auto; /* Ensure it aligns properly */
        min-width: 250px;
        background: rgba(15, 15, 18, 0.98); /* Slightly more opaque for mobile */
    }
    
    /* When nav is scrolled on mobile */
    nav.scrolled .dropdown-content {
        background: rgba(255, 255, 255, 0.98);
    }

            .contact-dropdown {
                position: relative;
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            nav {
                padding: 20px;
            }

            nav.scrolled {
                padding: 15px 20px;
            }

            .main-content {
                margin-top: 70px;
            }

            .caption-title {
                font-size: 18px;
            }

            .caption-description {
                font-size: 13px;
            }
        }

        /* ensure tall images are never cut off */
        @media (max-width: 480px) {
            .artboard img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <nav id="mainNav">
        <div class="nav-container">
            <a href="#" class="logo">Amanuel Tesfalem</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="#" class="nav-link active" data-page="home">PORTFOLIO</a>
                <!-- Contact Dropdown -->
                <div class="contact-dropdown">
                    <a href="#" class="nav-link contact-trigger" id="contactTrigger">Contact</a>
                    <div class="dropdown-content" id="dropdownContent">
                        <div class="contact-info-item">
                            <i class="bi bi-geo-alt"></i>
                            <span>ADDIS ABABA, ETHIOPIA</span>
                        </div>
                        <div class="contact-info-item">
                            <i class="bi bi-telephone"></i>
                            <a href="tel:+251973862326">+251 973862326</a>
                        </div>
                        <div class="contact-info-item">
                            <i class="bi bi-envelope"></i>
                            <a href="mailto:amanueltesfalem808@gmail.com">amanueltesfalem808@gmail.com</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <!-- Home Page - Full Width Images (tall, but now fully visible on mobile) -->
        <div class="page-wrapper active" id="home-page">
            <div class="artboard">
                <img src="2.jpg" alt="Portfolio piece 2">
            </div>
            <div class="artboard">
                <img src="1.jpg" alt="Portfolio piece 1">
            </div>
        </div>

        <!-- (About page is commented out as in original) -->
    </div>

    <footer>© 2026 Amanuel Tesfalem – Portfolio</footer>

    <script>
        // Navigation functionality (identical to original, but kept concise)
        const nav = document.getElementById('mainNav');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        const navLinksAll = document.querySelectorAll('.nav-link');
        const contactTrigger = document.getElementById('contactTrigger');
        const dropdownContent = document.getElementById('dropdownContent');
        const pageWrappers = document.querySelectorAll('.page-wrapper');

        // Nav scroll effect
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Mobile menu toggle
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Contact dropdown toggle
        contactTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropdownContent.classList.toggle('active');
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!navLinks.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                navLinks.classList.remove('active');
            }
            if (!contactTrigger.contains(e.target) && !dropdownContent.contains(e.target)) {
                dropdownContent.classList.remove('active');
            }
        });

        // Page switching function (only home exists, but keep for consistency)
        function switchPage(pageId) {
            pageWrappers.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            navLinksAll.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-page') === pageId) {
                    link.classList.add('active');
                }
            });
            navLinks.classList.remove('active');
            dropdownContent.classList.remove('active');
            window.scrollTo(0, 0);
        }

        // Add click events to nav links (excluding contact trigger)
        navLinksAll.forEach(link => {
            if (link !== contactTrigger) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const pageId = link.getAttribute('data-page');
                    if (pageId) switchPage(pageId);
                    dropdownContent.classList.remove('active');
                });
            }
        });

        // Initial scroll check
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>

</html>
